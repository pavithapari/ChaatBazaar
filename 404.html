<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="css/404.css">
  <title>404 - Page Not Found</title>
</head>

<body>

  <main class="page-404">

    <div class="content-wrap">

      <h1 class="err-number">404</h1>

       <div class="food-trail" aria-hidden="true">
        <span class="food-item" style="animation-delay: 0s;">🥟</span>
        <span class="food-item" style="animation-delay: 0.25s;">🍛</span>
        <span class="food-item" style="animation-delay: 0.5s;">🌶️</span>
        <span class="food-item" style="animation-delay: 0.75s;">🥣</span>
        <span class="food-item" style="animation-delay: 1s;">🫙</span>
      </div>

      <h2 class="error-title">
        Oops! Looks like this page got eaten 🌮
      </h2>

      <p class="error-subtitle">
        We couldn't find what you are looking for in the menu.
      </p>

      <p class="error-text">
        Maybe it got lost somewhere between the samosas and pani puri!!
      </p>

      <div class="btn-group">
         <a href="index.html" class="btn-primary">
         Back To Home
         </a>
      </div>
    </div>

  </main>

</body>
</html>
